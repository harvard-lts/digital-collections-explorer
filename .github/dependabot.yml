version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"

  # Frontend - Photographs
  - package-ecosystem: "npm"
    directory: "/src/frontend/photographs"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
      - "photographs"

  # Frontend - Maps
  - package-ecosystem: "npm"
    directory: "/src/frontend/maps"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
      - "maps"

  # Frontend - Documents
  - package-ecosystem: "npm"
    directory: "/src/frontend/documents"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
      - "documents"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"
